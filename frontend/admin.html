<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Travel Planner</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <link rel="stylesheet" href="static/css/custom.css">
</head>
<body>
    <nav>
        <h2>🌍 Travel Planner - Admin</h2>
        <div>
            <a href="/dashboard.html" data-testid="nav-dashboard">Dashboard</a>
            <button id="logout-btn" data-testid="logout-btn">Logout</button>
        </div>
    </nav>

    <main class="dashboard-container" data-testid="admin-container">
        <h1>Admin Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card" data-testid="admin-stat-users">
                <h3>Total Users</h3>
                <p class="stat-value" id="total-users">0</p>
            </div>
            <div class="stat-card" data-testid="admin-stat-trips">
                <h3>Total Trips</h3>
                <p class="stat-value" id="total-trips">0</p>
            </div>
            <div class="stat-card" data-testid="admin-stat-activities">
                <h3>Total Activities</h3>
                <p class="stat-value" id="total-activities">0</p>
            </div>
            <div class="stat-card" data-testid="admin-stat-budget">
                <h3>Total Budget</h3>
                <p class="stat-value" id="total-budget">$0</p>
            </div>
        </div>

        <section class="trips-section">
            <h2>All Users</h2>
            <div id="users-list" data-testid="users-list"></div>
        </section>

        <section class="trips-section">
            <h2>All Trips</h2>
            <div id="trips-list" data-testid="trips-list"></div>
        </section>
    </main>

    <script src="static/js/utils.js"></script>
    <script src="static/js/admin.js"></script>
</body>
</html>
