<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Travel Planner</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <link rel="stylesheet" href="static/css/custom.css">
</head>
<body>
    <nav>
        <h2>🌍 Travel Planner</h2>
        <div>
            <a href="/" data-testid="nav-home">Home</a>
            <a href="/register.html" data-testid="nav-register">Register</a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-box">
            <h1>Login</h1>
            <form id="login-form" data-testid="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required data-testid="login-email-input">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required data-testid="login-password-input">
                </div>
                <div id="error-message" class="error" data-testid="login-error-message"></div>
                <button type="submit" data-testid="login-submit-btn">Login</button>
            </form>
            <p>Don't have an account? <a href="/register.html" data-testid="register-link">Register here</a></p>
        </div>
    </main>

    <script src="static/js/utils.js"></script>
    <script src="static/js/auth.js"></script>
</body>
</html>
